<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Get Quote</a></li>
            <li><a href="#" id="admin-btn">Admin</a></li>
        </ul>
    </nav>

    <!-- Admin Panel Modal -->
    <div id="admin-panel" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Admin Panel</h2>
            <div class="tabs">
                <ul>
                    <li class="tab-link active" data-tab="dashboard">Dashboard</li>
                    <li class="tab-link" data-tab="products">Products Management</li>
                    <li class="tab-link" data-tab="analytics">Analytics</li>
                    <li class="tab-link" data-tab="settings">Settings</li>
                </ul>
            </div>
            <div class="tab-content active" id="dashboard">
                <h3>Real-time Analytics</h3>
                <div id="real-time-analytics">
                    <!-- Analytics content goes here -->
                </div>
            </div>
            <div class="tab-content" id="products">
                <h3>Products Management</h3>
                <div id="product-management">
                    <button id="add-product">Add Vehicle</button>
                    <ul id="product-list">
                        <!-- List of products goes here -->
                    </ul>
                </div>
            </div>
            <div class="tab-content" id="analytics">
                <h3>Inventory Breakdown</h3>
                <div id="inventory-breakdown">
                    <!-- Inventory breakdown content goes here -->
                </div>
            </div>
            <div class="tab-content" id="settings">
                <h3>Site Configuration</h3>
                <div id="site-configuration">
                    <!-- Site configuration fields go here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Modal functionality
        const adminBtn = document.getElementById('admin-btn');
        const adminPanel = document.getElementById('admin-panel');
        const closeBtn = document.querySelector('.close-btn');

        adminBtn.onclick = () => adminPanel.style.display = 'block';
        closeBtn.onclick = () => adminPanel.style.display = 'none';
        window.onclick = (event) => {
            if (event.target == adminPanel) {
                adminPanel.style.display = 'none';
            }
        };

        // Tab functionality
        const tabLinks = document.querySelectorAll('.tab-link');
        const tabContents = document.querySelectorAll('.tab-content');

        tabLinks.forEach(link => {
            link.addEventListener('click', () => {
                const tabId = link.getAttribute('data-tab');
                tabLinks.forEach(item => item.classList.remove('active'));
                tabContents.forEach(item => item.classList.remove('active'));
                link.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });
    </script>
</body>
</html>
